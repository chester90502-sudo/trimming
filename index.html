<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Produksi Cutting</title>
<style>
body{font-family:'Segoe UI',Arial;background:linear-gradient(135deg,#0f172a,#1e293b);padding:20px;color:#fff}
h1{text-align:center;margin-bottom:20px;font-size:30px}
.card{background:#1e293b;border-radius:18px;padding:25px;box-shadow:0 15px 35px rgba(0,0,0,0.5)}
table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;background:#fff;color:#000;border-radius:12px}
th,td{border:1px solid #ddd;padding:8px;text-align:center;font-size:14px;min-width:80px}
th{background:#0f172a;color:#fff;position:sticky;top:0;z-index:5}

/* FREEZE */
.rankCol{position:sticky;left:0;background:#e2e8f0;z-index:6;font-weight:bold;min-width:70px}
.nameCol{position:sticky;left:70px;background:#f1f5f9;z-index:6;font-weight:bold;min-width:200px}
th.rankCol{left:0;z-index:7}
th.nameCol{left:70px;z-index:7}

/* Warna status produksi */
.low{background:#ffb3b3}
.mid{background:#ffe9a8}
.high{background:#b6f5c2}

/* Warna kode ketidakhadiran */
.code-p{background:#93c5fd !important; color:#1e3a8a !important; font-weight:bold} /* Perbantuan - Biru */
.code-be{background:#fca5a5 !important; color:#7f1d1d !important; font-weight:bold} /* Pulang Awal - Merah Muda */
.code-u{background:#86efac !important; color:#14532d !important; font-weight:bold} /* UKS - Hijau */
.code-i{background:#fde047 !important; color:#713f12 !important; font-weight:bold} /* Ijin - Kuning */
.code-a{background:#f87171 !important; color:#7f1d1d !important; font-weight:bold} /* Alpa - Merah */
.code-m{background:#c4b5fd !important; color:#5b21b6 !important; font-weight:bold} /* Minggu - Ungu */
.code-l{background:#fdba74 !important; color:#9a3412 !important; font-weight:bold} /* Libur - Oranye */
.code-bs{background:#f0abfc !important; color:#86198f !important; font-weight:bold} /* Barang Sedikit - Pink */

input{width:75px;padding:5px;font-size:14px}
.nameInput{width:180px}

.shiftRow{background:#cbd5e1;font-weight:bold;color:#000;font-size:15px}
.warning{font-weight:bold;color:#dc2626}

.login{text-align:center;margin-bottom:20px}
button{padding:10px 18px;background:#2563eb;color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:14px}
button:hover{background:#1d4ed8}

.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:15px;justify-content:center;font-size:12px}
.legend-item{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.1);padding:5px 10px;border-radius:20px}
.legend-color{width:20px;height:20px;border-radius:4px;border:1px solid rgba(255,255,255,0.3)}

/* Input untuk kode */
.code-input{width:60px;text-align:center;text-transform:uppercase;font-weight:bold}
.has-code{background:#e0e7ff !important}

/* Loading indicator */
.loading-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}
.loading-spinner {
  width: 50px;
  height: 50px;
  border: 5px solid #f3f3f3;
  border-top: 5px solid #3498db;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>
<body>

<h1>DASHBOARD PRODUKSI CUTTING</h1>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
</div>

<div class="login">
<input type="password" id="pass" placeholder="Password Admin">
<button onclick="login()">Login Admin</button>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-color code-p"></div>P = Perbantuan</div>
  <div class="legend-item"><div class="legend-color code-be"></div>BE = Pulang Awal</div>
  <div class="legend-item"><div class="legend-color code-u"></div>U = UKS</div>
  <div class="legend-item"><div class="legend-color code-i"></div>I = Ijin</div>
  <div class="legend-item"><div class="legend-color code-a"></div>A = Alpa</div>
  <div class="legend-item"><div class="legend-color code-m"></div>M = Minggu</div>
  <div class="legend-item"><div class="legend-color code-l"></div>L = Libur</div>
  <div class="legend-item"><div class="legend-color code-bs"></div>BS = Barang Sedikit</div>
</div>

<div class="card">
<div style="overflow:auto; max-height:75vh;">
<table>
<thead>
<tr>
<th class="rankCol">Rank</th>
<th class="nameCol">Shift / Mesin / Operator</th>
<script>
for(let i=1;i<=31;i++){document.write("<th>"+i+"</th>")}
</script>
<th>%</th>
<th>SP</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3WEe4qb-QgpNYJuD_3zettZN8IFOfWVc",
  authDomain: "hasil-ec37d.firebaseapp.com",
  databaseURL: "https://hasil-ec37d-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hasil-ec37d",
  storageBucket: "hasil-ec37d.firebasestorage.app",
  messagingSenderId: "296148451757",
  appId: "1:296148451757:web:7041bb382da038f0e1a124"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const TARGET = 700;
const ADMIN_PASS = "bangkumisganteng123";
let isAdmin = false;
let currentData = {};
let isRendering = false;
let pendingUpdate = null;

// Kode yang valid - BS tidak mempengaruhi persentase dan SP
const VALID_CODES = ['P', 'BE', 'U', 'I', 'A', 'M', 'L', 'BS'];
// Kode yang dianggap hari kerja untuk perhitungan ranking
const WORKING_CODES = ['P'];
// Kode yang tidak mempengaruhi SP dan persentase
const IGNORED_CODES = ['BS', 'BE', 'U', 'I', 'A', 'M', 'L'];

const shifts = ["SHIFT A","SHIFT B","SHIFT C"];
const machines = ["MESIN 1","MESIN 2","MESIN 3","MESIN 4","MESIN 5","MESIN 6"];
const operatorPerMachine = 7;

window.login = function(){
 if(document.getElementById("pass").value===ADMIN_PASS){
   isAdmin=true;
   alert("Login berhasil");
   render(currentData);
 }else{
   alert("Password salah");
 }
}

function showLoading() {
  document.getElementById('loadingOverlay').style.display = 'flex';
}

function hideLoading() {
  document.getElementById('loadingOverlay').style.display = 'none';
}

function getCodeClass(code) {
  if (!code) return '';
  const upperCode = code.toString().toUpperCase();
  if (VALID_CODES.includes(upperCode)) {
    return 'code-' + upperCode.toLowerCase();
  }
  return '';
}

function isValidCode(value) {
  if (!value) return false;
  const upperValue = value.toString().toUpperCase().trim();
  return VALID_CODES.includes(upperValue);
}

function render(data={}){
  // Cegah render berulang saat data berubah cepat
  if (isRendering) {
    pendingUpdate = data;
    return;
  }
  
  isRendering = true;
  currentData = data || {};
  
  // Gunakan requestAnimationFrame untuk tidak blocking UI
  requestAnimationFrame(() => {
    try {
      performRender();
    } finally {
      isRendering = false;
      if (pendingUpdate) {
        const update = pendingUpdate;
        pendingUpdate = null;
        render(update);
      }
    }
  });
}

function performRender() {
 const tbody=document.getElementById("body");
 tbody.innerHTML="";

 shifts.forEach(shift=>{
   const shiftRow = document.createElement('tr');
   shiftRow.className = 'shiftRow';
   shiftRow.innerHTML = `<td colspan='35'>${shift}</td>`;
   tbody.appendChild(shiftRow);

   let rankingData=[];

   machines.forEach(machine=>{
     const machineRow = document.createElement('tr');
     machineRow.className = 'shiftRow';
     machineRow.innerHTML = `<td colspan='35'>${machine}</td>`;
     tbody.appendChild(machineRow);

     for(let op=1; op<=operatorPerMachine; op++){
       let operatorKey = shift+"_"+machine+"_OP"+op;
       let opData = currentData?.[operatorKey] || {};
       let nama = opData.nama || operatorKey;

       let totalPercent=0;
       let count=0;
       let consecutiveLow=0;
       let maxConsecutiveLow=0;
       let workingDays = 0;

       const row = document.createElement('tr');
       row.setAttribute('data-key', operatorKey);
       
       // Rank cell
       const rankCell = document.createElement('td');
       rankCell.className = 'rankCol';
       rankCell.textContent = '-';
       row.appendChild(rankCell);

       // Name cell
       const nameCell = document.createElement('td');
       nameCell.className = 'nameCol';
       if(isAdmin){
         const nameInput = document.createElement('input');
         nameInput.className = 'nameInput';
         nameInput.value = nama;
         nameInput.onchange = function() { saveName(operatorKey, this.value); };
         nameCell.appendChild(nameInput);
       } else {
         nameCell.textContent = nama;
       }
       row.appendChild(nameCell);

       for(let d=1; d<=31; d++){
         const dayData = opData?.[d] || {};
         const val = dayData.hasil || 0;
         const code = dayData.kode || '';
         let cls="";
         let displayVal = val;
         let isCounted = true; // Apakah hari ini dihitung untuk SP dan persentase
         
         // Jika ada kode
         if (code && isValidCode(code)) {
           displayVal = code.toUpperCase();
           cls = getCodeClass(code);
           const upperCode = code.toUpperCase();
           
           // BS dan kode lainnya tidak dihitung untuk SP dan persentase
           if (IGNORED_CODES.includes(upperCode)) {
             isCounted = false;
             // Reset consecutive low karena BS tidak dianggap produksi rendah
             if (consecutiveLow > maxConsecutiveLow) maxConsecutiveLow = consecutiveLow;
             consecutiveLow = 0;
           } else if (WORKING_CODES.includes(upperCode)) {
             // P (Perbantuan) dihitung sebagai hari kerja tapi tidak ada nilai produksi
             workingDays++;
             isCounted = false;
             if (consecutiveLow > maxConsecutiveLow) maxConsecutiveLow = consecutiveLow;
             consecutiveLow = 0;
           }
         } else if (val > 0) {
           // Ada nilai produksi numerik
           workingDays++;
           let p = val / TARGET * 100;
           
           if (val <= 600) { 
             cls = "low"; 
             consecutiveLow++; 
           } else if (val <= 750) {
             if (consecutiveLow > maxConsecutiveLow) maxConsecutiveLow = consecutiveLow;
             consecutiveLow = 0;
             cls = "mid";
           } else {
             if (consecutiveLow > maxConsecutiveLow) maxConsecutiveLow = consecutiveLow;
             consecutiveLow = 0;
             cls = "high";
           }
           
           // Hanya hitung persentase jika bukan dari kode BS
           totalPercent += p; 
           count++;
         } else {
           // Hari kosong (0)
           if (consecutiveLow > maxConsecutiveLow) maxConsecutiveLow = consecutiveLow;
           consecutiveLow = 0;
         }

         const cell = document.createElement('td');
         cell.className = cls;
         
         if (isAdmin) {
           const input = document.createElement('input');
           input.type = 'text';
           input.className = 'code-input';
           input.value = displayVal === 0 ? '' : displayVal;
           input.placeholder = '0/P/BS';
           input.onchange = function() { 
             // Debounce save
             clearTimeout(this.saveTimeout);
             this.saveTimeout = setTimeout(() => {
               saveData(operatorKey, d, this.value);
             }, 300);
           };
           cell.appendChild(input);
         } else {
           cell.textContent = displayVal === 0 ? '' : displayVal;
         }
         
         row.appendChild(cell);
       }

       if (consecutiveLow > maxConsecutiveLow) maxConsecutiveLow = consecutiveLow;

       // Hitung rata-rata hanya dari hari kerja produktif (bukan kode ketidakhadiran atau BS)
       let avg = count ? (totalPercent / count).toFixed(1) : 0;
       rankingData.push({key: operatorKey, avg: Number(avg), workingDays: workingDays});

       let spText = "-";
       if (maxConsecutiveLow >= 3) {
         let spLevel = Math.floor(maxConsecutiveLow / 3);
         spText = "SP " + spLevel;
       }

       // Persentase cell
       const percentCell = document.createElement('td');
       percentCell.textContent = avg + '%';
       row.appendChild(percentCell);
       
       // SP cell
       const spCell = document.createElement('td');
       spCell.className = 'warning';
       spCell.textContent = spText;
       row.appendChild(spCell);
       
       tbody.appendChild(row);
     }
   });

   // Ranking per shift - berdasarkan rata-rata persentase
   rankingData.sort((a, b) => b.avg - a.avg);
   rankingData.forEach((r, index) => {
     const row = document.querySelector(`tr[data-key='${r.key}']`);
     if (row) { 
       row.children[0].innerText = index + 1; 
     }
   });
 });
}

// Fungsi untuk menyimpan data (hasil atau kode)
window.saveData = function(op, day, value) {
  showLoading();
  const upperValue = value.toString().toUpperCase().trim();
  
  let updateData;
  
  // Cek apakah input adalah kode valid
  if (isValidCode(upperValue)) {
    // Simpan sebagai kode
    // Untuk BS, simpan nilai 0 agar tidak mengganggu perhitungan
    updateData = {
      hasil: 0,
      kode: upperValue
    };
  } else {
    // Simpan sebagai angka hasil produksi
    const numValue = Number(value) || 0;
    updateData = {
      hasil: numValue,
      kode: ''
    };
  }
  
  // Gunakan set dengan error handling
  set(ref(db, 'cutting/' + op + '/' + day), updateData)
    .then(() => {
      hideLoading();
    })
    .catch((error) => {
      hideLoading();
      console.error("Error saving:", error);
      alert("Gagal menyimpan data: " + error.message);
    });
}

window.saveName = function(op, name){
  showLoading();
  set(ref(db, 'cutting/' + op + '/nama'), name)
    .then(() => {
      hideLoading();
    })
    .catch((error) => {
      hideLoading();
      console.error("Error saving name:", error);
    });
}

// Optimasi: gunakan once untuk data awal, lalu onValue untuk update
let initialLoad = true;
onValue(ref(db, 'cutting'), (snap) => {
  if (initialLoad) {
    initialLoad = false;
    hideLoading();
  }
  render(snap.val());
}, (error) => {
  console.error("Firebase error:", error);
  hideLoading();
  alert("Error memuat data: " + error.message);
});

// Tampilkan loading saat halaman dimuat
showLoading();

</script>

</body>
</html>
