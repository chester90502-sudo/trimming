<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Produksi Cutting</title>

<style>
body{font-family:Arial;background:#0f172a;padding:20px;color:#fff}
h1{text-align:center}
.card{background:#1e293b;border-radius:14px;padding:20px}
table{border-collapse:collapse;width:max-content;min-width:100%;background:#fff;color:#000}
th,td{border:1px solid #ccc;padding:6px;text-align:center}
th{background:#0f172a;color:#fff;position:sticky;top:0}

.rankCol{position:sticky;left:0;background:#e2e8f0;font-weight:bold}
.nameCol{position:sticky;left:70px;background:#f1f5f9;font-weight:bold}

.low{background:#ffb3b3}
.mid{background:#ffe9a8}
.high{background:#b6f5c2}

.shiftRow{background:#cbd5e1;font-weight:bold;color:#000}
.warning{color:red;font-weight:bold}

.month-selector{display:flex;gap:10px;justify-content:center;margin-bottom:15px;flex-wrap:wrap}
button{padding:8px 16px;border:none;border-radius:6px;cursor:pointer}
</style>

</head>
<body>

<h1>DASHBOARD PRODUKSI CUTTING</h1>

<div class="month-selector">

<select id="monthSelect">
<option value="0">Januari</option>
<option value="1">Februari</option>
<option value="2">Maret</option>
<option value="3">April</option>
<option value="4">Mei</option>
<option value="5">Juni</option>
<option value="6">Juli</option>
<option value="7">Agustus</option>
<option value="8">September</option>
<option value="9">Oktober</option>
<option value="10">November</option>
<option value="11">Desember</option>
</select>

<select id="yearSelect">
<option value="2026">2026</option>
<option value="2027">2027</option>
<option value="2028">2028</option>
<option value="2029">2029</option>
<option value="2030">2030</option>
</select>

<button onclick="changeMonth()">Tampilkan</button>

</div>

<div class="card">
<div style="overflow:auto;max-height:80vh">

<table>
<thead>
<tr id="headerDays"></tr>
</thead>
<tbody id="body"></tbody>
</table>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue, off } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyD3WEe4qb-QgpNYJuD_3zettZN8IFOfWVc",
authDomain:"hasil-ec37d.firebaseapp.com",
databaseURL:"https://hasil-ec37d-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"hasil-ec37d",
storageBucket:"hasil-ec37d.firebasestorage.app",
messagingSenderId:"296148451757",
appId:"1:296148451757:web:7041bb382da038f0e1a124"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const TARGET = 700;

let currentMonth = 0;
let currentYear = 2026;
let unsubscribe = null;

const shifts = ["SHIFT A","SHIFT B","SHIFT C"];
const machines = ["MESIN 1","MESIN 2","MESIN 3","MESIN 4","MESIN 5","MESIN 6"];
const operatorPerMachine = 7;

function getDaysInMonth(month,year){
return new Date(year,month+1,0).getDate();
}

function renderHeader(){

const days = getDaysInMonth(currentMonth,currentYear);
const row = document.getElementById("headerDays");

row.innerHTML = "<th class='rankCol'>Rank</th><th class='nameCol'>Operator</th>";

for(let i=1;i<=days;i++){
row.innerHTML += "<th>"+i+"</th>";
}

row.innerHTML += "<th>%</th><th>SP</th>";

}

window.changeMonth = function(){

currentMonth = parseInt(document.getElementById("monthSelect").value);
currentYear = parseInt(document.getElementById("yearSelect").value);

loadData();

}

function loadData(){

if(unsubscribe){
off(ref(db,"cutting/"+currentYear+"/"+currentMonth));
}

renderHeader();

const dataRef = ref(db,"cutting/"+currentYear+"/"+currentMonth);

unsubscribe = onValue(dataRef,(snap)=>{
render(snap.val());
});

}

function render(data={}){

const tbody = document.getElementById("body");
tbody.innerHTML = "";

const days = getDaysInMonth(currentMonth,currentYear);

shifts.forEach(shift=>{

tbody.innerHTML += "<tr class='shiftRow'><td colspan='"+(days+4)+"'>"+shift+"</td></tr>";

machines.forEach(machine=>{

tbody.innerHTML += "<tr class='shiftRow'><td colspan='"+(days+4)+"'>"+machine+"</td></tr>";

for(let op=1; op<=operatorPerMachine; op++){

let key = shift+"_"+machine+"_OP"+op;
let opData = data?.[key] || {};
let nama = opData.nama || "Operator "+op;

let total = 0;
let count = 0;
let lowStreak = 0;
let maxLow = 0;

let row = "<tr>";
row += "<td class='rankCol'>-</td>";
row += "<td class='nameCol'>"+nama+"</td>";

for(let d=1; d<=days; d++){

let val = opData?.[d]?.hasil || 0;
let cls = "";

if(val>0){

let percent = val/TARGET*100;
total += percent;
count++;

if(val<=500){cls="low";lowStreak++}
else if(val<=699){cls="mid";lowStreak=0}
else{cls="high";lowStreak=0}

}

row += "<td class='"+cls+"'>"+(val||"")+"</td>";

}

if(lowStreak>maxLow) maxLow = lowStreak;

let avg = count ? (total/count).toFixed(1) : 0;

let sp = "-";
if(maxLow>=3){
sp = "SP "+Math.floor(maxLow/3);
}

row += "<td>"+avg+"%</td>";
row += "<td class='warning'>"+sp+"</td>";
row += "</tr>";

tbody.innerHTML += row;

}

});

});

}

loadData();

</script>

</body>
</html>
